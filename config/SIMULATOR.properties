# ============================================================
#  ORB-BLOOMBERG - modo SIMULADOR (no requiere Terminal ni blpapi)
#  Arranque: run-simulator.bat   (o)   java -jar target\ORB-BLOOMBERG-1.0-fat.jar config\SIMULATOR.properties
# ============================================================

securityExchange=BLOOMBERG_MKD

simulador=yes
simulador.prices.file=config/simulator-prices.json
simulador.refresh.ms=1000

# Servidor de fan-out a los suscriptores del ORB (host:puerto)
server.host=0.0.0.0:8050
path.logs=logs/

zoneId=America/Santiago

diagnostics.enabled=true
diagnostics.interval.ms=30000
marketdata.max.trades.per.symbol=2000

# Kafka deshabilitado (sin 'app.stream.kafka.binder.brokers') -> arranque sin dependencias externas
