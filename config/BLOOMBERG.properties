# ============================================================
#  ORB-BLOOMBERG - modo BLOOMBERG en vivo (Desktop API / DAPI)
#  Requiere: build con  mvn -Pbloomberg ...  + blpapi3_64.dll en el PATH + Terminal Bloomberg corriendo.
#  Arranque: run-bloomberg.bat
# ============================================================

securityExchange=BLOOMBERG_MKD

simulador=no

# --- Conexion Bloomberg Desktop API (DAPI) ---
bloomberg.host=localhost
bloomberg.port=8194

# Sufijo opcional para completar el ticker cuando el cliente manda solo "IBM" -> "IBM US Equity".
# Dejar vacio si los clientes ya envian el ticker Bloomberg completo (recomendado).
bloomberg.security.suffix=

# Campos top-of-book a suscribir en //blp/mktdata
bloomberg.fields=BID,ASK,BID_SIZE,ASK_SIZE,LAST_PRICE,SIZE_LAST_TRADE,VOLUME,OPEN,HIGH,LOW,PREV_SES_LAST_PRICE,MKTDATA_EVENT_TYPE

# --- Servidor de fan-out a los suscriptores del ORB (host:puerto) ---
server.host=0.0.0.0:8050
path.logs=logs/

zoneId=America/Santiago

diagnostics.enabled=true
diagnostics.interval.ms=30000
marketdata.max.trades.per.symbol=2000

# --- Kafka (opcional): descomenta para reenviar notificaciones a Kafka ---
# app.stream.kafka.binder.brokers=172.16.0.6:29092
# app.stream.kafka.binder.topics=trade-monitor-notification-BLOOMBERG
