# ============================================================
#  Config por defecto que el servicio siembra en %PROGRAMDATA%\ORB-BLOOMBERG\config\
#  la PRIMERA vez. En instalaciones posteriores NO se sobrescribe (conserva tus ediciones).
# ============================================================

securityExchange=BLOOMBERG_MKD

simulador=no

# --- Modo cliente remoto: para PCs sin Bloomberg Terminal local ---
remote.client.enabled=false
remote.client.host=
remote.client.id=orb-bloomberg-desktop

# --- Conexion Bloomberg Desktop API (DAPI) ---
bloomberg.host=localhost
bloomberg.port=8194
bloomberg.security.suffix=
bloomberg.fields=BID,ASK,BID_SIZE,ASK_SIZE,LAST_PRICE,SIZE_LAST_TRADE,VOLUME,OPEN,HIGH,LOW,PREV_SES_LAST_PRICE,MKTDATA_EVENT_TYPE

# Papeles bootstrap: se suscriben solos al arrancar y quedan visibles en desktop/web.
bootstrap.subscribe.symbols=BNTNB 6 08/15/60 Corp,USDBRL Curncy,BRLCLP Curncy

# --- Servidor de fan-out a los suscriptores del ORB (host:puerto) ---
server.host=0.0.0.0:8011
path.logs=logs/

# --- Ventana de administracion (escritorio, sin navegador) ---
gui.enabled=true
# Panel web opcional (off por defecto): pon admin.enabled=true para exponerlo en :admin.port
admin.enabled=false
admin.port=8090

# --- Auto-update: el app busca versiones nuevas en este servidor y ofrece actualizar ---
update.enabled=true
update.url=http://172.16.0.8:8060

zoneId=America/Santiago

diagnostics.enabled=true
diagnostics.interval.ms=30000
marketdata.max.trades.per.symbol=2000

# --- Kafka (opcional) ---
# app.stream.kafka.binder.brokers=172.16.0.6:29092
# app.stream.kafka.binder.topics=trade-monitor-notification-BLOOMBERG
